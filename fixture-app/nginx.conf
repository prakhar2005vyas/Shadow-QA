server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Serve static files; return 404 for anything not found
    # This is essential so dead links (#4) and missing images (#7) actually 404.
    location / {
        try_files $uri $uri/ =404;
    }

    # Disable access logs to keep test output clean (error logs still on)
    access_log off;
    error_log /dev/stderr warn;
}
